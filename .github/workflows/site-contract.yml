name: Site contract

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: hyle-site-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate generated locales and public claims
        run: npm test
